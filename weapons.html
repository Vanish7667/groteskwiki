<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оружие — GroteskStalker PvE Wiki</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<!-- Основные css -->
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/gear.css">
<link rel="stylesheet" href="css/scroll_layout.css">

<!-- Компоненты css -->
<link rel="stylesheet" href="css/components/garland.css">
<link rel="stylesheet" href="css/components/fon.css">
<link rel="stylesheet" href="css/components/footer.css">
<link rel="stylesheet" href="css/components/nav.css">
</head>

<body>
<div id="garland"></div>

<header>
    <h1>Оружие</h1>
</header>

<div id="nav"></div>

<main>
    <!-- категории -->
    <div class="gear-categories">
        <button class="category-btn active" data-cat="all">Все</button>
        <button class="category-btn" data-cat="Combat">Автоматическое</button>
        <button class="category-btn" data-cat="Sniper">Снайперское</button>
        <button class="category-btn" data-cat="Pistol">Пистолеты</button>
        <button class="category-btn" data-cat="Shotgun">Дробовики</button>
        <button class="category-btn" data-cat="Melee">Холодное</button>
    </div>

    <!-- карточки -->
    <div id="kits-grid" class="kits-grid"></div>

    <!-- модальное окно -->
    <div id="kitModal" class="modal hidden">
        <div class="modal-content">
            <span id="modalClose" class="modal-close">&times;</span>

            <div class="modal-header">
                <h2 id="modalKitName"></h2>
                <div id="modalKitCategory" class="modal-category"></div>
            </div>

            <div id="modalRankButtons" class="modal-ranks"></div>

            <div class="modal-body">
                <div class="modal-img-wrap">
                    <img id="modalMainImage">
                </div>

                <div class="modal-desc-stats">
                    <div id="modalDesc"></div>
                    <div id="modalObtain"></div>
                    <div id="modalStats"></div>
                </div>
            </div>

            <div class="modal-slots">
                <h3>Слоты</h3>
                <div id="modalSlots" class="slots-container"></div>
            </div>
        </div>
    </div>
</main>

<div id="footer"></div>

<script src="js/components/components.js"></script>
<script src="js/weapons.js"></script>
</body>
</html>
